name: Build Android APK

on:
  push:
    branches: [ "main" ] # Hoặc branch chính của bạn
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Sử dụng cache để không phải tải lại các thư viện Gradle ở các lần build sau
    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # Lệnh build APK tối ưu nhất (Debug APK phục vụ cài đặt thử nghiệm ngay)
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --build-cache

    # Lưu trữ file APK sau khi build để tải xuống trực tiếp từ GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FlowFinance-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
